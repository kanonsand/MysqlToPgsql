server:
  port: 8080

spring:
  datasource:
    # H2 in PostgreSQL mode for portable testing
    url: jdbc:h2:mem:testdb;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DATABASE_TO_UPPER=FALSE
    username: sa
    password: 
    driver-class-name: org.h2.Driver
  
  # H2 Console for debugging (optional)
  h2:
    console:
      enabled: true
      path: /h2-console

mybatis:
  mapper-locations: classpath:mapper/*.xml
  configuration:
    map-underscore-to-camel-case: true

# Conversion settings
conversion:
  enabled: true
  strict-mode: false

# Logging configuration
logging:
  level:
    root: INFO
    converter.mybatis: DEBUG
    org.example.server: DEBUG
    org.mybatis: DEBUG
